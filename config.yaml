# ============================================================
# config.yaml — orinoco-forecast
# Configuración central del experimento
# REGLA R7: Todos los hiperparámetros se leen desde aquí.
# PROHIBIDO hardcodear valores en los scripts.
# ============================================================

# --- Configuración global del problema ---
# target_station: cualquier estación del dataset puede ser el objetivo.
# Opciones válidas: ayacucho | caicara | ciudad_bolivar | palua
# El código usa get_predictors() en STATION_TOPOLOGY para excluir aguas abajo automáticamente.
target_station: "palua"
forecast_horizon: 15          # días a predecir (t+1 a t+15)
lookback_window: 150         # IGUAL que el LSTM gold standard (ensemble_lb150_lags_xl)

# --- Partición temporal (CRONOLÓGICA, nunca aleatoria) ---
# SPLIT CORREGIDO (2026-04-29) - IDÉNTICO al LSTM gold standard
# Train: 1981-01-01 -> 2018-12-31 | 13,879 dias (86.1%)
#   Cubre 38 anios, incluye El Nino 1982/83, 1997/98, 2015/16, pico 2018 (12.47m)
# Val  : 2019-01-01 -> 2022-06-30 |  1,277 dias  (7.9%)
#   Incluye 2021 (pico inedito 12.14m) -> EarlyStopping lo ve
# Test : 2022-07-01 -> 2025-02-24 |    970 dias  (6.0%)
#   Cubre 2023 (caida -2m), 2024, 2025 -> condiciones mas recientes
train_end: "2018-12-31"
val_end:   "2022-06-30"
# test implicito: 2022-07-01 -> fin del dataset

# --- Arquitectura residual ---
# El LSTM y el Transformer aprenden a predecir DELTA = nivel_futuro - nivel_actual
# en lugar del nivel absoluto. Ventajas:
#   1. Fuerza al modelo a competir directamente con el Naive (que predice delta=0)
#   2. Ancla cada prediccion al nivel conocido hoy (fisica correcta)
#   3. El target es casi estacionario -> mas facil de aprender
# La reconstruccion final: nivel_pred = nivel_hoy + delta_pred
# Para comparación justa, ambos usan el mismo paradigma.
use_residual: true

# --- Rutas de datos ---
# NOTA: Se recuperó el dataset crudo original (dataset_orinoco_true_raw.csv).
# El dataset imputado legacy (.xlsx) fue descartado por contaminación metodológica.
# La imputación se realizará internamente en la Fase 1b (anti-leakage).
data:
  raw: "data/raw/dataset_orinoco_true_raw.csv"  # Dataset oficial con NaNs reales
  audited: "data/processed/dataset_audited.parquet"
  final: "data/processed/dataset_final.parquet"
  enso: "data/external/enso_oni_index.csv"
  chirps: "data/external/chirps_precipitation.nc"

# --- Rutas de resultados ---
results:
  models_dir: "results/models/"
  metrics_dir: "results/metrics/"
  figures_dir: "results/figures/"
  baseline_metrics: "results/metrics/baseline_metrics.json"

# --- Grafo hidrológico de estaciones ---
# REGLA R8: Nomenclatura oficial de estaciones
#
# NOTA SOBRE DISTANCIAS (km_relative):
#   Son distancias RELATIVAS por CARRETERA tomando Ayacucho como referencia 0.
#   Fuente: Google Maps (verificadas por el autor, 2026-04-19).
#   Las distancias fluviales (por cauce) son diferentes y requieren cartas náuticas
#   del INC (Instituto Nacional de Canalizaciones) — no disponibles en fuentes públicas.
#   Distancias por carretera (Google Maps):
#     Ayacucho → Caicara:        339 km  (tramo medido directamente)
#     Caicara → Ciudad Bolívar:  359 km  (tramo medido directamente)
#     Ciudad Bolívar → Palúa:    119 km  (tramo medido directamente)
#     Ayacucho → Palúa (directo): 791 km (ruta directa A→D, Google Maps)
#   NOTA: La suma de segmentos (339+359+119=817 km) difiere de la ruta directa (791 km)
#   por optimización de rutas que hace Google Maps al no pasar por cada ciudad intermedia.
#   Se usa la medición directa A→D por ser la más defendible.
#
# NOTA SOBRE lag_to_target_days:
#   Valores EMPÍRICOS calculados por cross-correlación sobre 18,683 registros reales
#   (1974-2025). No son estimados teóricos. Ver resultados en eda_lag_times.json
#   tras ejecutar EDA PC-01-03.
#   Alerta: lag Ciudad Bolívar→Palúa = 0 días puede ser artefacto de imputación
#   o efecto del Caroní como driver dominante. Investigar en PC-01-03.
stations:
  ayacucho:
    km_relative: 0              # Referencia base. Fuente: Google Maps (2026-04-19)
    order: 0
    role: "upstream_far"
    lag_to_target_days: 12      # Empírico: cross-corr dataset real (corr=0.981)
  caicara:
    km_relative: 339            # Verificado: 339 km por carretera desde Ayacucho
    order: 1
    role: "upstream_mid"
    lag_to_target_days: 4       # Empírico: cross-corr dataset real (corr=0.979)
  ciudad_bolivar:
    km_relative: 698            # Verificado: 339 + 359 km por carretera desde Ayacucho
    order: 2
    role: "upstream_near"
    lag_to_target_days: 0       # Empírico: cross-corr dataset real (corr=0.993)
                                # ⚠️ Investigar en EDA PC-01-03: lag=0 sospechoso
  palua:
    km_relative: 791            # Verificado: ruta directa Ayacucho→Palúa (Google Maps)
                                # OJO: suma de segmentos da 817 km (discrepancia de 26 km
                                # por optimización de rutas de Google Maps)
    order: 3
    role: "configurable_target" # Sin "default" — es un target configurable más

# --- Hiperparámetros: LSTM (Keras) --- MODELO CORE
lstm:
  units: [64, 32]
  dropout: 0.2
  learning_rate: 0.001
  batch_size: 64
  max_epochs: 200
  patience: 15               # EarlyStopping
  validation_split: 0.0      # Usar split explicito, no automatico
  loss: "huber"              # 'mse' (default) | 'mae' | 'huber'
  huber_delta: 0.5           # Errores > 0.5 (escala normalizada, ~50cm) se tratan linealmente
                             # Atenua la influencia del crash de dic-2022 en el gradiente

# --- Hiperparámetros: Transformer (PyTorch) --- PLUS ACADÉMICO
transformer:
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  batch_size: 32             # Máximo para RTX 3060 6GB VRAM
  max_epochs: 100
  patience: 10
  learning_rate: 0.0001
  features_path: "data/processed/dataset_orinoco_features.csv"  # Dataset gold standard (build_features.py)

# --- Reproducibilidad ---
seed: 42

# --- Hardware ---
gpu:
  memory_growth: true        # tf.config.experimental.set_memory_growth
  # batch_size LSTM recomendado: 64
  # batch_size Transformer máximo: 32

# --- Métricas de éxito (umbrales) ---
thresholds:
  nse_acceptable: 0.80
  nse_good: 0.90
  kge_acceptable: 0.75
  peak_timing_error_days: 3  # máximo error en timing de picos

# --- Restricciones físicas ---
physical:
  min_level_m: 0.0           # Nivel nunca negativo
  max_level_multiplier: 1.15 # Predicciones no exceden máx histórico + 15%
  max_daily_change_m: 1.5    # Cambio diario > 1.5m es sospechoso
