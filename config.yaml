# ============================================================
# config.yaml — orinoco-forecast
# Configuración central del experimento
# REGLA R7: Todos los hiperparámetros se leen desde aquí.
# PROHIBIDO hardcodear valores en los scripts.
# ============================================================

# --- Configuración global del problema ---
# target_station: cualquier estación del dataset puede ser el objetivo.
# Opciones válidas: ayacucho | caicara | ciudad_bolivar | palua
# El código usa get_predictors() en STATION_TOPOLOGY para excluir aguas abajo automáticamente.
target_station: "palua"
forecast_horizon: 7          # días a predecir (t+1 a t+7)
lookback_window: 30          # días de historia como input (ajustar tras EDA PC-01-03)

# --- Partición temporal (CRONOLÓGICA, nunca aleatoria) ---
train_end: "2015-12-31"
val_end: "2020-12-31"
# test: 2021-01-01 a 2025-02-24 (implícito)

# --- Rutas de datos ---
# NOTA: Se recuperó el dataset crudo original (dataset_orinoco_true_raw.csv).
# El dataset imputado legacy (.xlsx) fue descartado por contaminación metodológica.
# La imputación se realizará internamente en la Fase 1b (anti-leakage).
data:
  raw: "data/raw/dataset_orinoco_true_raw.csv"  # Dataset oficial con NaNs reales
  audited: "data/processed/dataset_audited.parquet"
  final: "data/processed/dataset_final.parquet"
  enso: "data/external/enso_oni_index.csv"
  chirps: "data/external/chirps_precipitation.nc"

# --- Rutas de resultados ---
results:
  models_dir: "results/models/"
  metrics_dir: "results/metrics/"
  figures_dir: "results/figures/"
  baseline_metrics: "results/metrics/baseline_metrics.json"

# --- Grafo hidrológico de estaciones ---
# REGLA R8: Nomenclatura oficial de estaciones
#
# NOTA SOBRE DISTANCIAS (km_relative):
#   Son distancias RELATIVAS tomando Ayacucho como referencia 0.
#   Las distancias fluviales reales (por cauce) requieren cartas náuticas
#   del INC (Instituto Nacional de Canalizaciones) — no disponibles en fuentes públicas.
#   Las distancias por carretera verificadas:
#     Ayacucho → Caicara: ~340-350 km (Troncal 12)
#     Caicara → Ciudad Bolívar: ~365-370 km
#     Ciudad Bolívar → Palúa (San Félix/Ciudad Guayana): ~110-120 km
#
# NOTA SOBRE lag_to_target_days:
#   Valores EMPÍRICOS calculados por cross-correlación sobre 18,683 registros reales
#   (1974-2025). No son estimados teóricos. Ver resultados en eda_lag_times.json
#   tras ejecutar EDA PC-01-03.
#   Alerta: lag Ciudad Bolívar→Palúa = 0 días puede ser artefacto de imputación
#   o efecto del Caroní como driver dominante. Investigar en PC-01-03.
stations:
  ayacucho:
    km_relative: 0              # Referencia relativa (no desde la naciente real)
    order: 0
    role: "upstream_far"
    lag_to_target_days: 12      # Empírico: cross-corr dataset real (corr=0.981)
  caicara:
    km_relative: 500            # Aproximado — distancia relativa a Ayacucho
    order: 1
    role: "upstream_mid"
    lag_to_target_days: 4       # Empírico: cross-corr dataset real (corr=0.979)
  ciudad_bolivar:
    km_relative: 900            # Aproximado — distancia relativa a Ayacucho
    order: 2
    role: "upstream_near"
    lag_to_target_days: 0       # Empírico: cross-corr dataset real (corr=0.993)
                                # ⚠️ Investigar en EDA PC-01-03: lag=0 sospechoso
  palua:
    km_relative: 1000           # Corregido: ~110-120 km carretera desde Ciudad Bolívar
    order: 3
    role: "downstream_target"   # Sin "default" — es un target configurable más

# --- Hiperparámetros: LSTM (Keras) --- MODELO CORE
lstm:
  units: [64, 32]
  dropout: 0.2
  learning_rate: 0.001
  batch_size: 64
  max_epochs: 200
  patience: 15               # EarlyStopping
  validation_split: 0.0      # Usar split explícito, no automático

# --- Hiperparámetros: Transformer (PyTorch) --- PLUS ACADÉMICO
transformer:
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  batch_size: 32             # Máximo para RTX 3060 6GB VRAM
  max_epochs: 100
  patience: 10
  learning_rate: 0.0001

# --- Reproducibilidad ---
seed: 42

# --- Hardware ---
gpu:
  memory_growth: true        # tf.config.experimental.set_memory_growth
  # batch_size LSTM recomendado: 64
  # batch_size Transformer máximo: 32

# --- Métricas de éxito (umbrales) ---
thresholds:
  nse_acceptable: 0.80
  nse_good: 0.90
  kge_acceptable: 0.75
  peak_timing_error_days: 3  # máximo error en timing de picos

# --- Restricciones físicas ---
physical:
  min_level_m: 0.0           # Nivel nunca negativo
  max_level_multiplier: 1.15 # Predicciones no exceden máx histórico + 15%
  max_daily_change_m: 1.5    # Cambio diario > 1.5m es sospechoso
